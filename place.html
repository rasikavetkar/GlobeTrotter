<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobeTrotter India – Swipe Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        /* ── Reset & Theme ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f141e;
            --card-bg: #1a222f;
            --text: #f5f5f7;
            --muted: rgba(245, 245, 247, 0.6);
            --accent-red: #ff477e;
            --accent-teal: #00f5d4;
            --accent-gold: #ffb703;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* ── Page Headline ── */
        .page-headline {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--text);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
            opacity: 0.9;
            letter-spacing: 0.02em;
        }

        /* ── Swipe Deck Container ── */
        .deck-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: 65vh;
            max-height: 550px;
            perspective: 1000px;
            z-index: 5;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 32px;
            overflow: hidden;
            cursor: grab;
            user-select: none;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            transition: transform 0.15s ease-out;
        }

        .card:active {
            cursor: grabbing;
        }

        /* ── Card Imagery ── */
        .card-image {
            width: 100%;
            height: 50%;
            object-fit: cover;
            pointer-events: none;
        }

        /* ── Card Content ── */
        .card-content {
            padding: 20px 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            margin-bottom: 8px;
        }

        .tag-container {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-desc {
            font-size: 0.9rem;
            line-height: 1.4;
            color: var(--muted);
        }

        /* ── Action Buttons ── */
        .action-bar {
            margin-top: 40px;
            display: flex;
            gap: 25px;
            align-items: center;
            z-index: 10;
        }

        .btn-action {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #161b26;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-action:hover {
            transform: scale(1.1);
            background: #1f2635;
        }

        .btn-no {
            color: var(--accent-red);
        }

        .btn-love {
            color: var(--accent-gold);
            width: 55px;
            height: 55px;
        }

        /* Smaller center button */
        .btn-yes {
            color: var(--accent-teal);
        }

        /* ── Footer ── */
        .footer-text {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        /* Directional Indicators */
        .stamp {
            position: absolute;
            top: 40px;
            padding: 10px 20px;
            border: 5px solid;
            border-radius: 10px;
            font-weight: 900;
            font-size: 2rem;
            text-transform: uppercase;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }

        .stamp-like {
            color: var(--accent-teal);
            border-color: var(--accent-teal);
            left: 30px;
            transform: rotate(-15deg);
        }

        .stamp-nope {
            color: var(--accent-red);
            border-color: var(--accent-red);
            right: 30px;
            transform: rotate(15deg);
        }
    </style>
</head>

<body>
    <div class="page-headline">Every corner has a story, what is yours?</div>
    <div class="deck-container" id="deck">
    </div>
    <div class="action-bar">
        <div class="btn-action btn-no" onclick="handleButtonClick('left')">✕</div>
        <div class="btn-action btn-love" onclick="handleButtonClick('up')">❤</div>
        <div class="btn-action btn-yes" onclick="handleButtonClick('right')">✔</div>
    </div>
    <div class="footer-text">
        Swipe Right = Yes, Left = No, Up = Love!
    </div>
    <script>
        const destinations = [
            { name: "Varanasi, UP", tags: ["Spiritual", "Heritage"], desc: "Witness the mesmerizing Ganga Aarti on the ancient ghats of the holy city.", img: "https://images.unsplash.com/photo-1561361513-2d000a50f0dc?auto=format&fit=crop&w=500" },
            { name: "Leh, Ladakh", tags: ["Adventure", "Cold Desert"], desc: "Navigate the world's highest motorable passes and azure Himalayan lakes.", img: "https://images.unsplash.com/photo-1581791534721-e599df4417f7?auto=format&fit=crop&w=500" },
            { name: "Jaipur, RJ", tags: ["History", "Architecture"], desc: "Explore the Pink City's majestic forts and the intricate Hawa Mahal.", img: "https://images.unsplash.com/photo-1477587458883-47145ed94245?auto=format&fit=crop&w=500" },
            { name: "Alleppey, KL", tags: ["Nature", "Backwaters"], desc: "Cruise through emerald green backwaters on a traditional luxury houseboat.", img: "https://images.unsplash.com/photo-1593693397690-362cb9666fc2?auto=format&fit=crop&w=500" },
            { name: "Hampi, KA", tags: ["Ancient Ruins", "UNESCO"], desc: "Walk through the boulder-strewn landscape of the forgotten Vijayanagara Empire.", img: "https://images.unsplash.com/photo-1586944310842-887e588d361f?auto=format&fit=crop&w=500" },
            { name: "Munnar, KL", tags: ["Tea Gardens", "Hills"], desc: "Breathe in the fresh air of rolling tea estates and misty mountain peaks.", img: "https://images.unsplash.com/photo-1516690561799-46d8f74f9abf?auto=format&fit=crop&w=500" },
            { name: "Rishikesh, UK", tags: ["Yoga", "Rafting"], desc: "The Yoga Capital of the world, where the Ganges meets the Himalayan foothills.", img: "https://images.unsplash.com/photo-1590050806299-4363293b3f2e?auto=format&fit=crop&w=500" },
            { name: "Agra, UP", tags: ["Monument", "Wonder"], desc: "Home to the Taj Mahal, the ultimate ivory-white marble testament to love.", img: "https://images.unsplash.com/photo-1548013146-72479768bbaa?auto=format&fit=crop&w=500" },
            { name: "Goa, GA", tags: ["Beaches", "Nightlife"], desc: "Sunkissed shores, Portuguese architecture, and vibrant coastal vibes.", img: "https://images.unsplash.com/photo-1512480175961-f0b386995c00?auto=format&fit=crop&w=500" },
            { name: "Jaisalmer, RJ", tags: ["Desert", "Golden Fort"], desc: "Camp under the stars in the Thar Desert near the living Golden Fort.", img: "https://images.unsplash.com/photo-1504609773096-104ff2c73ba4?auto=format&fit=crop&w=500" },
            { name: "Srinagar, JK", tags: ["Paradise", "Lakes"], desc: "The 'Venice of the East', famous for its Dal Lake and Mughal gardens.", img: "https://images.unsplash.com/photo-1595815771614-ade9d652a65d?auto=format&fit=crop&w=500" },
            { name: "Mysore, KA", tags: ["Palaces", "Culture"], desc: "Famous for its glittering royal palace and the grand Dasara festival.", img: "https://images.unsplash.com/photo-1582510003544-4d00b7f74220?auto=format&fit=crop&w=500" },
            { name: "Darjeeling, WB", tags: ["Tea Hills", "Toy Train"], desc: "Gaze at the Kanchenjunga peaks while sipping the world's finest tea.", img: "https://images.unsplash.com/photo-1544735716-392fe2489ffa?auto=format&fit=crop&w=500" },
            { name: "Khajuraho, MP", tags: ["Sculptures", "History"], desc: "Admire the world-famous temples known for their stunning erotic carvings.", img: "https://images.unsplash.com/photo-1620397380961-f49c00650f9f?auto=format&fit=crop&w=500" },
            { name: "Udaipur, RJ", tags: ["Lakes", "Romance"], desc: "The City of Lakes, offering boat rides at sunset and floating palaces.", img: "https://images.unsplash.com/photo-1615836245337-f5b9b2303f10?auto=format&fit=crop&w=500" }
        ];
        const deck = document.getElementById('deck');
        let topCard;
        let isDragging = false;
        let startX, startY, currentX, currentY;
        function init() {
            destinations.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.zIndex = index;
                card.innerHTML = `
          <img src="${data.img}" class="card-image">
          <div class="card-content">
            <h2 class="card-title">${data.name}</h2>
            <div class="tag-container">
              ${data.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <p class="card-desc">${data.desc}</p>
          </div>
          <div class="stamp stamp-like">LIKE</div>
          <div class="stamp stamp-nope">NOPE</div>
        `;
                deck.appendChild(card);
            });
            setupTopCard();
        }
        function setupTopCard() {
            const cards = document.querySelectorAll('.card');
            if (cards.length === 0) {
                window.location.href = 'leaderboard.html';
                return;
            }
            topCard = cards[cards.length - 1];
            topCard.addEventListener('mousedown', startDrag);
            topCard.addEventListener('touchstart', startDrag);
        }
        function startDrag(e) {
            isDragging = true;
            startX = (e.pageX || e.touches[0].pageX);
            startY = (e.pageY || e.touches[0].pageY);
            topCard.style.transition = 'none';
            window.addEventListener('mousemove', drag);
            window.addEventListener('touchmove', drag);
            window.addEventListener('mouseup', endDrag);
            window.addEventListener('touchend', endDrag);
        }
        function drag(e) {
            if (!isDragging) return;
            currentX = (e.pageX || e.touches[0].pageX) - startX;
            currentY = (e.pageY || e.touches[0].pageY) - startY;

            let rotation = currentX / 15;
            topCard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotation}deg)`;

            // Stamp opacity
            const likeStamp = topCard.querySelector('.stamp-like');
            const nopeStamp = topCard.querySelector('.stamp-nope');
            likeStamp.style.opacity = currentX > 50 ? currentX / 150 : 0;
            nopeStamp.style.opacity = currentX < -50 ? Math.abs(currentX) / 150 : 0;
        }
        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            const threshold = 130;
            if (Math.abs(currentX) > threshold) {
                dismiss(currentX > 0 ? 'right' : 'left');
            } else if (currentY < -threshold) {
                dismiss('up');
            } else {
                topCard.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                topCard.style.transform = '';
                topCard.querySelectorAll('.stamp').forEach(s => s.style.opacity = 0);
            }

            window.removeEventListener('mousemove', drag);
            window.removeEventListener('touchmove', drag);
        }
        function dismiss(dir) {
            topCard.style.transition = 'transform 0.5s ease-in';
            if (dir === 'right') topCard.style.transform = 'translate(1000px, 0) rotate(45deg)';
            if (dir === 'left') topCard.style.transform = 'translate(-1000px, 0) rotate(-45deg)';
            if (dir === 'up') topCard.style.transform = 'translate(0, -1000px)';
            setTimeout(() => {
                topCard.remove();
                setupTopCard();
            }, 300);
        }
        function handleButtonClick(dir) {
            if (!topCard) return;
            dismiss(dir === 'right' ? 'right' : dir === 'left' ? 'left' : 'up');
        }
        init();
    </script>
</body>

</html>
