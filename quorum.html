<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow-teal {
            box-shadow: 0 0 15px rgba(69, 216, 237, 0.3);
        }
        body {
            transition: opacity 0.5s ease-out;
            opacity: 1;
        }
        body.fade-out {
            opacity: 0;
        }
    </style>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {error: "#ffb4ab", "on-surface": "#d6e6e0", "on-tertiary": "#003739", "on-secondary-fixed-variant": "#005236", outline: "#849495", "tertiary-fixed-dim": "#59d8de", "surface-tint": "#00dce5", "surface-container": "#15221f", "surface-container-highest": "#2a3834", "primary-container": "#00f5ff", "tertiary-container": "#73f0f6", "primary-fixed": "#63f7ff", "tertiary-fixed": "#79f5fb", "surface-container-lowest": "#04110d", "inverse-on-surface": "#25332f", "on-secondary-container": "#00311f", "on-primary-container": "#006c71", "surface-bright": "#2e3c38", "inverse-surface": "#d6e6e0", "secondary-container": "#00a572", "on-tertiary-fixed-variant": "#004f52", "outline-variant": "#3a494a", secondary: "#4edea3", "on-tertiary-container": "#006c70", "on-primary-fixed": "#002021", "inverse-primary": "#00696e", "on-surface-variant": "#b9caca", "on-tertiary-fixed": "#002021", "surface-variant": "#2a3834", "on-error-container": "#ffdad6", "on-background": "#d6e6e0", primary: "#e9feff", surface: "#081613", "on-secondary": "#003824", "surface-container-high": "#1f2d29", "on-primary": "#003739", background: "#081613", "surface-dim": "#081613", "surface-container-low": "#101e1b", "primary-fixed-dim": "#00dce5", "secondary-fixed": "#6ffbbe", "on-secondary-fixed": "#002113", "secondary-fixed-dim": "#4edea3", "on-primary-fixed-variant": "#004f53", "on-error": "#690005", tertiary: "#e9feff", "error-container": "#93000a"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, spacing: {md: "24px", xl: "64px", gutter: "20px", xs: "4px", lg: "40px", margin: "24px", sm: "12px", base: "8px"}, fontFamily: {"label-md": ["Inter"], "headline-lg": ["Noto Serif"], "display-xl": ["Noto Serif"], "body-md": ["Inter"], "body-lg": ["Inter"], "headline-md": ["Noto Serif"], "label-sm": ["Inter"]}, fontSize: {"label-md": ["14px", {lineHeight: "1.4", letterSpacing: "0.05em", fontWeight: "600"}], "headline-lg": ["32px", {lineHeight: "1.2", fontWeight: "600"}], "display-xl": ["48px", {lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700"}], "body-md": ["16px", {lineHeight: "1.5", fontWeight: "400"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}], "headline-md": ["24px", {lineHeight: "1.3", fontWeight: "600"}], "label-sm": ["12px", {lineHeight: "1.4", letterSpacing: "0.08em", fontWeight: "500"}]}}}};</script>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md overflow-x-hidden">
<!-- Hero Background Layer -->
<div class="fixed inset-0 z-0">
<img alt="Cinematic Alpine Lake" class="w-full h-full object-cover brightness-[0.4]" data-alt="Stunning cinematic wide shot of a turquoise alpine lake surrounded by jagged snow-capped peaks at twilight, soft atmospheric mist." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVLuIMzPXVN3O4BHbg-VQwdEoM6CvNzY-sSx5-Mfq-yVDFnniFwPCkaSKgwdaoH5IFShEYtf1b9nW3GPLB-VR2AYa5ABiH59PeS-jdtyZqUnLczww0oKxe_R0AtyFwdykvy3a1aJrIO-PFrt6extQWHYKEhk3_wxfvPXeXqGp5Jw77pT70RqVHNqrT5x8zURsiWr2R-C_9HPl3KDxZmfkzG29vPWBK_CaOuVlVBrrwotnk4s5lUJlgO8fBdTe_BHaPoZK55QG0_gP-"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/50"></div>
</div>

<!-- Main Content Canvas -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-margin pt-xl pb-xl">
<!-- Onboarding Card -->
<div class="w-full max-w-lg glass-panel rounded-3xl p-lg shadow-2xl relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-tertiary to-transparent opacity-50"></div>
<div class="text-center mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-sm">
                    Who's joining the adventure?
                </h1>
<p class="font-body-md text-on-surface-variant opacity-80">
                    Define your travel council to begin the collective journey.
                </p>
</div>
<div class="space-y-md">
<!-- Input Fields Group -->
<div class="space-y-sm" id="traveler-fields-container">
<div class="relative">
<label class="block font-label-sm text-label-sm text-tertiary mb-xs ml-1">COUNCIL MEMBER 1</label>
<div class="flex items-center glass-panel bg-white/5 rounded-xl border-white/10 px-4 py-3 focus-within:border-tertiary transition-all">
<span class="material-symbols-outlined text-tertiary mr-3" data-icon="person">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/40 font-body-md" placeholder="Enter name" type="text" value="Alex Chen"/>
</div>
</div>
<div class="relative">
<label class="block font-label-sm text-label-sm text-on-surface-variant/60 mb-xs ml-1">COUNCIL MEMBER 2</label>
<div class="flex items-center glass-panel bg-white/5 rounded-xl border-white/10 px-4 py-3 focus-within:border-tertiary transition-all">
<span class="material-symbols-outlined text-on-surface-variant/40 mr-3" data-icon="person">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/40 font-body-md" placeholder="Enter name" type="text"/>
</div>
</div>
<div class="relative">
<label class="block font-label-sm text-label-sm text-on-surface-variant/60 mb-xs ml-1">COUNCIL MEMBER 3 (OPTIONAL)</label>
<div class="flex items-center glass-panel bg-white/5 rounded-xl border-white/10 px-4 py-3 focus-within:border-tertiary transition-all">
<span class="material-symbols-outlined text-on-surface-variant/40 mr-3" data-icon="person">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/40 font-body-md" placeholder="Enter name" type="text"/>
</div>
</div>
</div>
<!-- Add Button -->
<button id="add-traveler-btn" class="w-full flex items-center justify-center gap-2 py-3 border border-dashed border-white/20 rounded-xl text-on-surface-variant hover:bg-white/5 hover:border-tertiary/50 transition-all font-label-md">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                    ADD TRAVELER
                </button>
<!-- Primary Action -->
<div class="pt-md">
<button id="start-voting-btn" class="w-full bg-secondary-fixed-dim text-on-secondary-fixed font-label-md text-label-md py-4 rounded-xl shadow-lg shadow-secondary-container/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                        START VOTING
                        <span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</div>
</div>
<!-- Cinematic Footnote -->
<div class="mt-lg pt-md border-t border-white/5 text-center">
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-40 uppercase tracking-widest flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[14px]" data-icon="public">public</span>
                    Collective Intelligence for Exploration
                </span>
</div>
</div>
</main>
<script>
    document.getElementById('add-traveler-btn').addEventListener('click', function() {
        const container = document.getElementById('traveler-fields-container');
        const count = container.children.length + 1;
        
        const newField = document.createElement('div');
        newField.className = 'relative';
        newField.innerHTML = `
            <label class="block font-label-sm text-label-sm text-on-surface-variant/60 mb-xs ml-1">COUNCIL MEMBER ${count} (OPTIONAL)</label>
            <div class="flex items-center glass-panel bg-white/5 rounded-xl border-white/10 px-4 py-3 focus-within:border-tertiary transition-all">
                <span class="material-symbols-outlined text-on-surface-variant/40 mr-3" data-icon="person">person</span>
                <input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/40 font-body-md" placeholder="Enter name" type="text"/>
            </div>
        `;
        container.appendChild(newField);
    });

    document.getElementById('start-voting-btn').addEventListener('click', function() {
        document.body.classList.add('fade-out');
        setTimeout(() => {
            window.location.href = 'place.html';
        }, 500);
    });
</script>
<!-- Suppressed BottomNavBar based on "Linear/Transactional" rule -->
<!-- (Hidden on onboarding to focus user intent) -->
</body></html>
