<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>WanderVote - Reveal Ceremony</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Be+Vietnam+Pro:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#C3C6D7",
                        "surface-container-highest": "#33374A",
                        "inverse-primary": "#FFB68D",
                        "on-secondary-container": "#331200",
                        "surface-variant": "#2D3142",
                        "on-primary-fixed": "#001848",
                        "inverse-surface": "#fcf9f6",
                        "primary-container": "#FF7F50",
                        "on-tertiary-container": "#002114",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#ffffff",
                        "surface-dim": "#15192B",
                        "tertiary-container": "#FFD700",
                        "on-tertiary-fixed": "#002114",
                        "outline-variant": "#424654",
                        "on-surface": "#F2F2F7",
                        "surface-bright": "#2D3142",
                        "primary": "#FF7F50",
                        "tertiary-fixed": "#FFD700",
                        "primary-fixed": "#FFDBC9",
                        "error": "#FFB4AB",
                        "surface": "#1A1C2E",
                        "surface-container-high": "#23273A",
                        "tertiary": "#FFD700",
                        "on-tertiary": "#332B00",
                        "surface-container": "#1F2335",
                        "error-container": "#93000a",
                        "on-background": "#F2F2F7",
                        "inverse-on-surface": "#1A1C2E",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#0F111E",
                        "secondary": "#FFD700",
                        "surface-container-low": "#1C1F32",
                        "on-primary-fixed-variant": "#763300",
                        "on-secondary-fixed-variant": "#763300",
                        "on-tertiary-fixed-variant": "#0e5138",
                        "on-error": "#690005",
                        "secondary-container": "#FFD700",
                        "secondary-fixed": "#FFD700",
                        "background": "#1A1C2E",
                        "surface-tint": "#FF7F50",
                        "primary-fixed-dim": "#FFB68D",
                        "outline": "#8E91A1",
                        "on-secondary-fixed": "#331200",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#E5C100",
                        "tertiary-fixed-dim": "#E5C100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "container-margin": "24px",
                        "gutter": "16px",
                        "section-gap": "64px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "h2": ["Plus Jakarta Sans"],
                        "h3": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "h1": ["Plus Jakarta Sans"],
                        "label-caps": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h2": ["36px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "h3": ["24px", { "lineHeight": "1.4", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        /* Sunset Horizon: Celebration Rays Background */
        .celebration-rays {
            background: radial-gradient(circle at center, #FF7F50 0%, transparent 70%);
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            z-index: -1;
            opacity: 0.15;
        }

        /* Confetti Simulation */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 10;
        }

        /* Tactile Button Depth */
        .btn-tactile {
            box-shadow: 0 4px 0 0 rgba(255, 127, 80, 0.4), 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-tactile:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 2px 0 0 rgba(255, 127, 80, 0.4);
        }

        /* Spring-Physics-Like Motion (Simulated via CSS) */
        @keyframes spring-zoom {
            0% {
                transform: scale(0.5) translateY(100px);
                opacity: 0;
            }

            70% {
                transform: scale(1.05) translateY(-10px);
                opacity: 1;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .reveal-zoom {
            animation: spring-zoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen overflow-hidden font-body-md">
    <!-- Top Navigation Bar -->
    <nav
        class="bg-surface-container/80 backdrop-blur-md shadow-sm fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 border-b border-white/5">
        <div class="text-xl font-black tracking-tight text-primary font-['Plus_Jakarta_Sans']">WanderVote</div>
        <div class="flex items-center gap-4">
            <button
                class="p-2 rounded-full hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform duration-200">
                <span class="material-symbols-outlined text-on-surface-variant" data-icon="group">group</span>
            </button>
            <button
                class="p-2 rounded-full hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform duration-200">
                <span class="material-symbols-outlined text-on-surface-variant"
                    data-icon="account_circle">account_circle</span>
            </button>
        </div>
    </nav>
    <!-- Main Reveal Canvas -->
    <main class="relative h-screen flex flex-col items-center justify-center p-container-margin">
        <!-- Background Celebration Rays -->
        <div class="celebration-rays"></div>
        <!-- Confetti Bits (Golden Theme) -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
            <div
                class="confetti bg-tertiary rotate-12 top-1/4 left-1/4 rounded-sm shadow-[0_0_10px_rgba(255,215,0,0.5)]">
            </div>
            <div class="confetti bg-primary top-1/3 right-1/4 rounded-full shadow-[0_0_10px_rgba(255,127,80,0.5)]">
            </div>
            <div class="confetti bg-tertiary bottom-1/3 left-1/2 rounded-md scale-125"></div>
            <div class="confetti bg-primary bottom-1/4 right-1/3 rotate-45"></div>
            <div class="confetti bg-tertiary-fixed top-1/2 left-10 rounded-sm"></div>
            <div class="confetti bg-primary-fixed bottom-10 right-20 rotate-12"></div>
        </div>
        <!-- The Winner Reveal Card -->
        <div class="reveal-zoom z-20 w-full max-w-md">
            <div
                class="bg-surface-container-low rounded-3xl overflow-hidden border border-white/5 shadow-[0_30px_60px_rgba(0,0,0,0.5)] relative">
                <!-- Inner Highlight for Tactile Look -->
                <div class="absolute inset-0 border-t border-white/10 pointer-events-none"></div>
                <div class="relative h-64 overflow-hidden">
                    <img alt="Winning destination" class="w-full h-full object-cover"
                        data-alt="Stunning sunset view of Balinese rice terraces with emerald green fields and distant coconut palms under a warm golden glow"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0CiChp6vIBwhbHd_M77K_RmlQdGts7jYAVhBrpCJEIe9djTGXkaljPMfXrWq6rV8xGapuC4S3ly6sAcSD3tZEXMo-WU4MmmacDRHiSkfbMovQFDldP_54utg0AXWZc6Pyqonz5vrAxB9acQnLjNHD3LbH0fats-XSwtQpXyGZZdeBnUEwXM55BDL8LRiX_j4G3fgNZZepQkqqcvbwP2eXZaBmGKB45RomMFum2l-2wzIIyf4bnUtKdWIS0LCPSmMCqhviCjqUsQg" />
                    <div
                        class="absolute top-4 right-4 bg-primary text-on-primary px-4 py-2 rounded-full font-label-caps flex items-center gap-2 shadow-lg ring-1 ring-white/20">
                        <span class="material-symbols-outlined text-sm"
                            style="font-variation-settings: 'FILL' 1;">star</span>
                        WINNER
                    </div>
                </div>
                <div class="p-8 text-center bg-surface-container-low">
                    <div class="text-tertiary font-label-caps tracking-widest mb-2">MOST VOTED DESTINATION</div>
                    <h1 class="font-h1 text-h2 text-primary mb-2">Ubud, Bali</h1>
                    <p class="font-body-md text-on-surface-variant mb-6">Chosen by 8 out of 10 group members</p>
                    <div class="flex justify-center gap-4 mb-8">
                        <div class="bg-surface-container-highest p-4 rounded-2xl shadow-sm border border-white/5 w-24">
                            <div class="font-h3 text-tertiary">85%</div>
                            <div class="text-[10px] font-label-caps text-outline">MATCH</div>
                        </div>
                        <div class="bg-surface-container-highest p-4 rounded-2xl shadow-sm border border-white/5 w-24">
                            <div class="font-h3 text-primary">12</div>
                            <div class="text-[10px] font-label-caps text-outline">ACTIVITIES</div>
                        </div>
                    </div>
                    <button
                        class="w-full bg-primary text-on-primary py-4 rounded-2xl font-h3 btn-tactile transition-all duration-200 flex items-center justify-center gap-2">
                        View Detailed Results
                        <span class="material-symbols-outlined">trending_up</span>
                    </button>
                </div>
            </div>
        </div>
        <!-- Group Reaction Chips -->
        <div class="mt-8 flex flex-wrap justify-center gap-3 max-w-lg">
            <div
                class="flex items-center gap-2 bg-primary/10 text-primary px-4 py-2 rounded-full font-label-caps border border-primary/20">
                <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                Sarah is excited!
            </div>
            <div
                class="flex items-center gap-2 bg-tertiary/10 text-tertiary px-4 py-2 rounded-full font-label-caps border border-tertiary/20">
                <span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
                Marcus booked his flight!
            </div>
            <div
                class="flex items-center gap-2 bg-white/10 text-on-surface px-4 py-2 rounded-full font-label-caps border border-white/10">
                <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
                Jenna sent a heart
            </div>
        </div>
    </main>
    <!-- Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-surface-container border-t border-white/5 shadow-[0_-4px_20px_rgba(0,0,0,0.5)] rounded-t-3xl md:hidden">
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all duration-150 active:scale-90"
            href="#">
            <span class="material-symbols-outlined" data-icon="explore">explore</span>
            <span class="text-[10px] font-bold uppercase tracking-wider font-['Plus_Jakarta_Sans']">Explore</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary bg-primary/10 rounded-2xl px-4 py-2 transition-all duration-150 active:scale-90"
            href="#">
            <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
            <span class="text-[10px] font-bold uppercase tracking-wider font-['Plus_Jakarta_Sans']">Results</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all duration-150 active:scale-90"
            href="#">
            <span class="material-symbols-outlined" data-icon="groups">groups</span>
            <span class="text-[10px] font-bold uppercase tracking-wider font-['Plus_Jakarta_Sans']">Group</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all duration-150 active:scale-90"
            href="#">
            <span class="material-symbols-outlined" data-icon="settings">settings</span>
            <span class="text-[10px] font-bold uppercase tracking-wider font-['Plus_Jakarta_Sans']">Settings</span>
        </a>
    </nav>
</body>

</html>
